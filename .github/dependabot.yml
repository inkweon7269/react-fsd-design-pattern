version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      tanstack:
        patterns:
          - "@tanstack/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/test"
          - "msw"
          - "jsdom"
      eslint:
        patterns:
          - "eslint*"
          - "typescript-eslint"
          - "globals"
      ui:
        patterns:
          - "radix-ui"
          - "class-variance-authority"
          - "clsx"
          - "tailwind-merge"
          - "lucide-react"
          - "shadcn"
          - "tw-animate-css"
      form:
        patterns:
          - "react-hook-form"
          - "@hookform/*"
          - "yup"
          - "zod"
      build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "typescript"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "github-actions"
